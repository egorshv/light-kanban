services:
  kanban:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data   # бэкап = копия файла ./data/kanban.db
    environment:
      KANBAN_TOKEN: ${KANBAN_TOKEN:-}          # пусто ⇒ аутентификация выключена
      KANBAN_LOG_LEVEL: ${KANBAN_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 3s
